<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lydiana Thrifting | Professional System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: linear-gradient(180deg, #f8fafc 0%, #f1f5f9 100%);
        }
        .card-system {
            background: white;
            border: 1px solid #eef2f6;
            border-radius: 20px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.04);
            transition: all 0.3s ease;
        }
        .card-system:hover {
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05);
        }
        /* Hide Spinners */
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type=number] { -moz-appearance: textfield; }
        
        /* Custom Input Focus */
        .input-premium {
            @apply w-full px-5 py-3.5 bg-slate-50 border border-slate-200 rounded-2xl text-sm transition-all duration-200 outline-none;
        }
        .input-premium:focus {
            @apply bg-white border-indigo-500 ring-4 ring-indigo-500/10;
        }

        .custom-scroll::-webkit-scrollbar { height: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-10 text-slate-800 border-t-[6px] border-indigo-600 min-h-screen">

    <div class="max-w-6xl mx-auto space-y-8">
        
        <!-- HEADER SECTION -->
        <div class="flex flex-col md:flex-row justify-between items-center gap-6">
            <div class="text-center md:text-left">
                <div class="flex items-center justify-center md:justify-start gap-3 mb-1">
                    <div class="bg-indigo-600 text-white p-2 rounded-xl shadow-lg shadow-indigo-200">
                        <i class="fa-solid fa-store text-xl"></i>
                    </div>
                    <h1 class="text-4xl font-extrabold text-slate-900 tracking-tighter">Lydiana <span class="text-indigo-600">Thrifting</span></h1>
                </div>
                <p class="text-slate-400 font-medium text-sm ml-1">Dashboard Finansial & Pencatatan Digital</p>
            </div>
            <div class="flex items-center gap-3 bg-white px-6 py-3 rounded-2xl border border-slate-200 shadow-sm">
                <div class="h-2 w-2 bg-emerald-500 rounded-full animate-pulse"></div>
                <span id="current-date" class="text-xs font-bold text-slate-600 tracking-wide uppercase"></span>
            </div>
        </div>

        <!-- STATS OVERVIEW -->
        <div class="grid grid-cols-1 sm:grid-cols-3 gap-6">
            <div class="card-system p-7 relative overflow-hidden group">
                <div class="absolute top-0 right-0 p-4 opacity-10 group-hover:scale-125 transition-transform duration-500 text-indigo-600">
                    <i class="fa-solid fa-wallet text-6xl"></i>
                </div>
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-[0.15em] mb-2">Total Pendapatan</p>
                <h3 id="revenue" class="text-3xl font-black text-slate-900 tracking-tight">Rp0</h3>
            </div>
            <div class="card-system p-7 relative overflow-hidden group">
                <div class="absolute top-0 right-0 p-4 opacity-10 group-hover:scale-125 transition-transform duration-500 text-slate-900">
                    <i class="fa-solid fa-box-open text-6xl"></i>
                </div>
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-[0.15em] mb-2">Barang Terjual</p>
                <h3 id="total-qty" class="text-3xl font-black text-slate-900 tracking-tight">0 <span class="text-sm text-slate-400 font-semibold tracking-normal uppercase">Pcs</span></h3>
            </div>
            <div class="card-system p-7 border-indigo-100 bg-indigo-50/20 relative overflow-hidden group">
                <div class="absolute top-0 right-0 p-4 opacity-10 group-hover:scale-125 transition-transform duration-500 text-indigo-600">
                    <i class="fa-solid fa-chart-line text-6xl"></i>
                </div>
                <p class="text-[10px] font-black text-indigo-400 uppercase tracking-[0.15em] mb-2">Rata-Rata Transaksi</p>
                <h3 id="average-value" class="text-3xl font-black text-indigo-600 tracking-tight">Rp0</h3>
            </div>
        </div>

        <!-- FORM INPUT -->
        <div class="card-system p-8 space-y-8">
            <div class="flex items-center gap-3">
                <h2 class="font-extrabold text-xl text-slate-800 tracking-tight">Entri Transaksi</h2>
                <div class="h-px flex-1 bg-slate-100"></div>
            </div>

            <div class="space-y-6">
                <div class="w-full md:w-1/2">
                    <label class="text-[11px] font-extrabold text-slate-400 uppercase tracking-widest mb-2 block ml-1">Nama Pelanggan</label>
                    <input id="customer" type="text" placeholder="Ketik nama pembeli..." class="input-premium">
                </div>

                <div class="grid grid-cols-1 md:grid-cols-4 gap-5">
                    <div class="md:col-span-1">
                        <label class="text-[11px] font-extrabold text-slate-400 uppercase tracking-widest mb-2 block ml-1">Nama Produk</label>
                        <input id="product" type="text" placeholder="Jaket, Baju, dll..." class="input-premium">
                    </div>
                    <div>
                        <label class="text-[11px] font-extrabold text-slate-400 uppercase tracking-widest mb-2 block ml-1">Kategori</label>
                        <select id="category" class="input-premium bg-white cursor-pointer">
                            <option value="">Pilih Kategori</option>
                            <option>Baju</option>
                            <option>Celana</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-[11px] font-extrabold text-slate-400 uppercase tracking-widest mb-2 block ml-1 text-center">Qty</label>
                        <input id="qty" type="number" placeholder="0" class="input-premium text-center font-bold">
                    </div>
                    <div>
                        <label class="text-[11px] font-extrabold text-slate-400 uppercase tracking-widest mb-2 block ml-1">Harga Satuan (Rp)</label>
                        <input id="price" type="number" placeholder="50000" class="input-premium font-bold text-indigo-600">
                    </div>
                </div>

                <div class="pt-6">
                    <button onclick="addTransaction()" class="w-full md:w-auto px-12 py-4 bg-slate-900 hover:bg-indigo-600 text-white font-bold rounded-2xl transition-all shadow-xl shadow-slate-200 flex items-center justify-center gap-4 active:scale-95 group text-sm tracking-widest uppercase">
                        <i class="fa-solid fa-plus-circle group-hover:rotate-90 transition-transform duration-300"></i>
                        Simpan Transaksi
                    </button>
                </div>
            </div>
        </div>

        <!-- DATA TABLE -->
        <div class="card-system overflow-hidden">
            <div class="p-8 flex flex-col md:flex-row justify-between items-center gap-6">
                <div class="flex items-center gap-3">
                    <div class="h-8 w-1 bg-indigo-600 rounded-full"></div>
                    <h2 class="font-extrabold text-slate-800 tracking-tight">Riwayat Penjualan</h2>
                </div>
                <div class="relative w-full md:w-80">
                    <i class="fa-solid fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-300 text-xs"></i>
                    <input id="search" onkeyup="render()" type="text" placeholder="Cari nama atau produk..." class="w-full pl-11 pr-5 py-3 bg-slate-50 border border-slate-100 rounded-full text-xs outline-none focus:ring-4 focus:ring-indigo-500/5 focus:bg-white transition-all">
                </div>
            </div>

            <div class="overflow-x-auto custom-scroll px-2">
                <table class="w-full text-left whitespace-nowrap">
                    <thead>
                        <tr class="text-[10px] uppercase tracking-[0.2em] text-slate-400 font-extrabold bg-slate-50/50">
                            <th class="px-8 py-5 text-center">Waktu</th>
                            <th class="px-8 py-5">Pelanggan</th>
                            <th class="px-8 py-5">Produk</th>
                            <th class="px-8 py-5 text-center">Kategori</th>
                            <th class="px-8 py-5 text-center">Qty</th>
                            <th class="px-8 py-5 text-right">Harga</th>
                            <th class="px-8 py-5 text-right">Total</th>
                            <th class="px-8 py-5 text-center">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody" class="text-sm divide-y divide-slate-50">
                        <!-- Content via JS -->
                    </tbody>
                </table>
            </div>

            <div id="emptyState" class="hidden py-32 text-center">
                <div class="bg-slate-50 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-4">
                    <i class="fa-solid fa-box-open text-slate-200 text-3xl"></i>
                </div>
                <p class="text-slate-400 font-bold tracking-widest uppercase text-[10px]">Data Belum Tersedia</p>
            </div>

            <div class="p-6 bg-slate-50/30 flex justify-center md:justify-end border-t border-slate-50">
                <button onclick="resetData()" class="text-[10px] text-slate-300 hover:text-red-500 font-extrabold transition-all uppercase tracking-[0.2em] flex items-center gap-2">
                    <i class="fa-solid fa-trash-can"></i> Hapus Database
                </button>
            </div>
        </div>
    </div>

    <!-- NOTIF TOAST -->
    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 z-50 transform translate-y-20 opacity-0 transition-all duration-500">
        <div class="bg-slate-900 text-white px-8 py-4 rounded-full shadow-2xl flex items-center gap-4">
            <i class="fa-solid fa-check-circle text-emerald-400"></i>
            <span id="toast-msg" class="text-xs font-bold tracking-[0.1em] uppercase"></span>
        </div>
    </div>

    <script>
        let transactions = JSON.parse(localStorage.getItem('transactions')) || [];

        const rupiah = (n) => new Intl.NumberFormat('id-ID', {
            style: 'currency', currency: 'IDR', minimumFractionDigits: 0
        }).format(n);

        function showToast(msg) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = msg;
            toast.classList.remove('translate-y-20', 'opacity-0');
            setTimeout(() => toast.classList.add('translate-y-20', 'opacity-0'), 3000);
        }

        function render() {
            const body = document.getElementById('tableBody');
            const emptyState = document.getElementById('emptyState');
            const q = document.getElementById('search').value.toLowerCase();
            body.innerHTML = '';
            
            let filtered = transactions.filter(x => 
                x.customer.toLowerCase().includes(q) || x.product.toLowerCase().includes(q)
            );

            if (filtered.length === 0) {
                emptyState.classList.remove('hidden');
            } else {
                emptyState.classList.add('hidden');
                filtered.forEach((t) => {
                    const realIndex = transactions.indexOf(t);
                    const total = t.qty * t.price;
                    const row = document.createElement('tr');
                    row.className = "hover:bg-indigo-50/20 transition-all duration-200 group";
                    row.innerHTML = `
                        <td class="px-8 py-6 text-[10px] font-bold text-slate-400 text-center uppercase tracking-wider">${t.date}</td>
                        <td class="px-8 py-6">
                            <span class="font-extrabold text-slate-800 block">${t.customer}</span>
                        </td>
                        <td class="px-8 py-6 text-slate-500 font-medium">${t.product}</td>
                        <td class="px-8 py-6 text-center">
                            <span class="px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-widest ${t.category === 'Baju' ? 'bg-indigo-50 text-indigo-600' : 'bg-amber-50 text-amber-600'}">
                                ${t.category}
                            </span>
                        </td>
                        <td class="px-8 py-6 text-center font-bold text-slate-700">x${t.qty}</td>
                        <td class="px-8 py-6 text-right text-slate-400 font-semibold text-xs">${rupiah(t.price)}</td>
                        <td class="px-8 py-6 text-right font-black text-slate-900 text-base">${rupiah(total)}</td>
                        <td class="px-8 py-6 text-center">
                            <button onclick="deleteTransaction(${realIndex})" class="w-9 h-9 rounded-xl text-slate-200 hover:bg-red-50 hover:text-red-500 transition-all flex items-center justify-center mx-auto">
                                <i class="fas fa-trash-can text-sm"></i>
                            </button>
                        </td>
                    `;
                    body.appendChild(row);
                });
            }

            // Calculations
            const totalRevenue = transactions.reduce((a, b) => a + (b.qty * b.price), 0);
            const totalQty = transactions.reduce((a, b) => a + Number(b.qty), 0);
            const averageValue = transactions.length ? Math.round(totalRevenue / transactions.length) : 0;

            document.getElementById('revenue').innerText = rupiah(totalRevenue);
            document.getElementById('total-qty').innerHTML = `${totalQty} <span class="text-sm text-slate-300 font-bold">Pcs</span>`;
            document.getElementById('average-value').innerText = rupiah(averageValue);
            
            localStorage.setItem('transactions', JSON.stringify(transactions));
        }

        function addTransaction() {
            const inputs = ['customer', 'product', 'category', 'qty', 'price'];
            const vals = {};
            
            for(let id of inputs) {
                const el = document.getElementById(id);
                if(!el.value) {
                    alert('Harap lengkapi semua kolom!');
                    return;
                }
                vals[id] = el.value;
            }

            const now = new Date();
            const timeStr = now.toLocaleDateString('id-ID', {day:'2-digit', month:'short'}) + ', ' + now.toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'});

            transactions.unshift({
                date: timeStr,
                customer: vals.customer,
                product: vals.product,
                category: vals.category,
                qty: Number(vals.qty),
                price: Number(vals.price)
            });

            inputs.forEach(id => document.getElementById(id).value = '');
            
            render();
            showToast('Berhasil Disimpan');
        }

        function deleteTransaction(index) {
            if (confirm('Hapus transaksi ini?')) {
                transactions.splice(index, 1);
                render();
                showToast('Data Dihapus');
            }
        }

        function resetData() {
            if (confirm('Hapus semua data database?')) {
                transactions = [];
                render();
                showToast('Database Bersih');
            }
        }

        // Set Current Date
        document.getElementById('current-date').innerText = new Date().toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });

        render();
    </script>
</body>
</html>
