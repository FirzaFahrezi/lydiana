<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lydiana Thrifting | Professional System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #f8fafc;
        }
        .card-system {
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }
        /* Menghilangkan tombol panah pada input angka */
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type=number] { -moz-appearance: textfield; }
        
        .custom-scroll::-webkit-scrollbar { height: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-10 text-slate-800 border-t-8 border-indigo-600">

    <div class="max-w-6xl mx-auto space-y-8">
        
        <!-- HEADER & DATE -->
        <div class="flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="text-center md:text-left">
                <h1 class="text-4xl font-black text-slate-900 tracking-tighter">Lydiana <span class="text-indigo-600">Thrifting</span></h1>
                <p class="text-slate-400 font-medium text-sm">Manajemen Penjualan & Dashboard Finansial</p>
            </div>
            <div class="px-5 py-2 bg-white rounded-full border border-slate-200 shadow-sm text-xs font-bold text-slate-500">
                <i class="fa-solid fa-calendar-day mr-2 text-indigo-500"></i>
                <span id="current-date"></span>
            </div>
        </div>

        <!-- NOTIFICATION TOAST -->
        <div id="toast" class="fixed top-6 right-6 left-6 md:left-auto z-50 transform translate-y-[-150%] transition-all duration-500">
            <div class="bg-slate-900 text-white px-6 py-4 rounded-2xl shadow-2xl flex items-center justify-center gap-4 border border-slate-700">
                <div class="h-2 w-2 bg-indigo-400 rounded-full animate-ping"></div>
                <span id="toast-msg" class="text-sm font-black tracking-wide uppercase"></span>
            </div>
        </div>

        <!-- STATS CARDS -->
        <div class="grid grid-cols-1 sm:grid-cols-3 gap-5">
            <div class="card-system p-6 border-b-4 border-b-indigo-500">
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Total Omzet</p>
                <h3 id="revenue" class="text-3xl font-black text-indigo-600 tracking-tight">Rp0</h3>
            </div>
            <div class="card-system p-6 border-b-4 border-b-slate-800">
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Barang Terjual</p>
                <h3 id="total-qty" class="text-3xl font-black text-slate-800 tracking-tight">0 <span class="text-sm text-slate-400 font-medium tracking-normal italic">Pcs</span></h3>
            </div>
            <div class="card-system p-6 border-b-4 border-b-emerald-500">
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Rata-rata Transaksi</p>
                <h3 id="average-value" class="text-3xl font-black text-emerald-600 tracking-tight">Rp0</h3>
            </div>
        </div>

        <!-- FORM INPUT TRANSAKSI (ATAS) -->
        <div class="card-system p-8 space-y-8">
            <div class="flex items-center gap-3">
                <div class="p-2 bg-slate-900 rounded-lg text-white">
                    <i class="fa-solid fa-file-invoice-dollar"></i>
                </div>
                <h2 class="font-black text-xl text-slate-800 tracking-tight italic">Input Penjualan Baru</h2>
            </div>

            <div class="space-y-6">
                <!-- Baris 1: Nama Pelanggan -->
                <div class="w-full md:w-1/2">
                    <label class="text-[11px] font-black text-slate-400 uppercase tracking-wider ml-1">Nama Pelanggan</label>
                    <input id="customer" type="text" placeholder="Nama pembeli..." class="w-full px-5 py-4 bg-slate-50 border border-slate-200 rounded-2xl text-sm focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none transition-all mt-1">
                </div>

                <!-- Baris 2: Detail Produk -->
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                    <div class="md:col-span-1">
                        <label class="text-[11px] font-black text-slate-400 uppercase tracking-wider ml-1">Produk</label>
                        <input id="product" type="text" placeholder="Baju/Celana..." class="w-full px-5 py-4 bg-slate-50 border border-slate-200 rounded-2xl text-sm outline-none mt-1">
                    </div>
                    <div>
                        <label class="text-[11px] font-black text-slate-400 uppercase tracking-wider ml-1">Kategori</label>
                        <select id="category" class="w-full px-5 py-4 bg-slate-50 border border-slate-200 rounded-2xl text-sm outline-none mt-1 bg-white cursor-pointer">
                            <option value="">Pilih</option>
                            <option>Baju</option>
                            <option>Celana</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-[11px] font-black text-slate-400 uppercase tracking-wider ml-1 text-center block">Qty</label>
                        <input id="qty" type="number" placeholder="0" class="w-full px-5 py-4 bg-slate-50 border border-slate-200 rounded-2xl text-sm font-black text-indigo-600 outline-none mt-1">
                    </div>
                    <div>
                        <label class="text-[11px] font-black text-slate-400 uppercase tracking-wider ml-1">Harga (Rp)</label>
                        <input id="price" type="number" placeholder="Masukkan Nominal" class="w-full px-5 py-4 bg-slate-50 border border-slate-200 rounded-2xl text-sm font-black text-indigo-600 outline-none mt-1">
                    </div>
                </div>

                <!-- TOMBOL SIMPAN (TERSENDIRI DI BAWAH) -->
                <div class="pt-6 border-t border-slate-100">
                    <button onclick="addTransaction()" class="w-full md:w-auto px-16 py-5 bg-indigo-600 hover:bg-slate-900 text-white font-black rounded-2xl transition-all shadow-xl shadow-indigo-100 flex items-center justify-center gap-4 active:scale-95 group tracking-widest text-xs">
                        <i class="fa-solid fa-check-double group-hover:scale-125 transition-transform"></i>
                        SIMPAN TRANSAKSI
                    </button>
                </div>
            </div>
        </div>

        <!-- RIWAYAT TRANSAKSI (BAWAH) -->
        <div class="card-system overflow-hidden">
            <div class="p-8 border-b border-slate-100 flex flex-col md:flex-row justify-between items-center gap-4">
                <h2 class="font-black text-slate-800 flex items-center gap-2 italic">
                    <i class="fa-solid fa-database text-slate-400 not-italic"></i> DATA PENJUALAN
                </h2>
                <div class="relative w-full md:w-80">
                    <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-slate-300 text-xs"></i>
                    <input id="search" onkeyup="render()" type="text" placeholder="Cari data..." class="w-full pl-11 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-full text-xs outline-none focus:ring-2 focus:ring-indigo-500/10 transition-all">
                </div>
            </div>

            <div class="overflow-x-auto custom-scroll">
                <table class="w-full text-left whitespace-nowrap">
                    <thead>
                        <tr class="text-[10px] uppercase tracking-[0.2em] text-slate-400 border-b border-slate-100 font-black bg-slate-50/50">
                            <th class="px-8 py-5 text-center">Waktu</th>
                            <th class="px-8 py-5">Pelanggan</th>
                            <th class="px-8 py-5">Produk</th>
                            <th class="px-8 py-5 text-center">Kategori</th>
                            <th class="px-8 py-5 text-center">Qty</th>
                            <th class="px-8 py-5 text-right">Harga</th>
                            <th class="px-8 py-5 text-right">Total</th>
                            <th class="px-8 py-5 text-center">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody" class="text-sm divide-y divide-slate-50">
                        <!-- Data Baris -->
                    </tbody>
                </table>
            </div>

            <div id="emptyState" class="hidden py-24 text-center">
                <i class="fa-solid fa-inbox text-slate-100 text-8xl mb-4"></i>
                <p class="text-slate-300 font-black italic tracking-widest uppercase text-xs">Database Kosong</p>
            </div>

            <div class="p-6 bg-slate-50/50 flex justify-center md:justify-end border-t border-slate-100">
                <button onclick="resetData()" class="text-[10px] text-slate-300 hover:text-red-500 font-black transition-all uppercase tracking-[0.2em] flex items-center gap-2">
                    <i class="fa-solid fa-trash-can"></i> Reset Database
                </button>
            </div>
        </div>
    </div>

    <script>
        let transactions = JSON.parse(localStorage.getItem('transactions')) || [];

        const rupiah = (n) => new Intl.NumberFormat('id-ID', {
            style: 'currency', currency: 'IDR', minimumFractionDigits: 0
        }).format(n);

        function showToast(msg) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = msg;
            toast.style.transform = 'translateY(0)';
            setTimeout(() => toast.style.transform = 'translateY(-150%)', 3000);
        }

        function render() {
            const body = document.getElementById('tableBody');
            const emptyState = document.getElementById('emptyState');
            const q = document.getElementById('search').value.toLowerCase();
            body.innerHTML = '';
            
            let filtered = transactions.filter(x => 
                x.customer.toLowerCase().includes(q) || x.product.toLowerCase().includes(q)
            );

            if (filtered.length === 0) {
                emptyState.classList.remove('hidden');
            } else {
                emptyState.classList.add('hidden');
                filtered.forEach((t) => {
                    const realIndex = transactions.indexOf(t);
                    const total = t.qty * t.price;
                    const row = document.createElement('tr');
                    row.className = "hover:bg-indigo-50/30 transition-colors group";
                    row.innerHTML = `
                        <td class="px-8 py-5 text-[10px] font-bold text-slate-400 text-center uppercase tracking-wider">${t.date}</td>
                        <td class="px-8 py-5 font-black text-slate-800">${t.customer}</td>
                        <td class="px-8 py-5 text-slate-500 font-medium">${t.product}</td>
                        <td class="px-8 py-5 text-center">
                            <span class="px-3 py-1 rounded-lg text-[10px] font-black uppercase tracking-widest ${t.category === 'Baju' ? 'bg-indigo-50 text-indigo-600' : 'bg-amber-50 text-amber-600'}">
                                ${t.category}
                            </span>
                        </td>
                        <td class="px-8 py-5 text-center font-black text-slate-700">x${t.qty}</td>
                        <td class="px-8 py-5 text-right text-slate-400 font-mono text-xs">${rupiah(t.price)}</td>
                        <td class="px-8 py-5 text-right font-black text-indigo-600 text-base font-mono">${rupiah(total)}</td>
                        <td class="px-8 py-5 text-center">
                            <button onclick="deleteTransaction(${realIndex})" class="w-9 h-9 rounded-full text-slate-200 hover:bg-red-50 hover:text-red-500 transition-all flex items-center justify-center mx-auto shadow-sm">
                                <i class="fas fa-trash-can text-xs"></i>
                            </button>
                        </td>
                    `;
                    body.appendChild(row);
                });
            }

            // PERHITUNGAN STATISTIK
            const totalRevenue = transactions.reduce((a, b) => a + (b.qty * b.price), 0);
            const totalQty = transactions.reduce((a, b) => a + Number(b.qty), 0);
            const averageValue = transactions.length ? Math.round(totalRevenue / transactions.length) : 0;

            document.getElementById('revenue').innerText = rupiah(totalRevenue);
            document.getElementById('total-qty').innerHTML = `${totalQty} <span class="text-sm text-slate-400 font-medium tracking-normal italic uppercase">Pcs</span>`;
            document.getElementById('average-value').innerText = rupiah(averageValue);
            
            localStorage.setItem('transactions', JSON.stringify(transactions));
        }

        function addTransaction() {
            const customerEl = document.getElementById('customer');
            const productEl = document.getElementById('product');
            const categoryEl = document.getElementById('category');
            const qtyEl = document.getElementById('qty');
            const priceEl = document.getElementById('price');

            if (!customerEl.value || !productEl.value || !categoryEl.value || !qtyEl.value || !priceEl.value) {
                alert('Peringatan: Harap isi semua data dengan lengkap.');
                return;
            }

            const now = new Date();
            const timeStr = now.toLocaleDateString('id-ID', {day:'2-digit', month:'short'}) + ', ' + now.toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'});

            transactions.unshift({
                date: timeStr,
                customer: customerEl.value,
                product: productEl.value,
                category: categoryEl.value,
                qty: Number(qtyEl.value),
                price: Number(priceEl.value)
            });

            // Reset Input
            customerEl.value = ''; productEl.value = ''; categoryEl.value = '';
            qtyEl.value = ''; priceEl.value = '';
            
            render();
            showToast('Penjualan Berhasil Disimpan');
        }

        function deleteTransaction(index) {
            if (confirm('Konfirmasi: Hapus data transaksi ini?')) {
                transactions.splice(index, 1);
                render();
                showToast('Data Telah Dihapus');
            }
        }

        function resetData() {
            if (confirm('BAHAYA: Seluruh database akan dihapus. Lanjutkan?')) {
                transactions = [];
                render();
                showToast('Database Bersih');
            }
        }

        document.getElementById('current-date').innerText = new Date().toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });

        render();
    </script>
</body>
</html>
