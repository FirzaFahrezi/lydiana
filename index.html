<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lydiana Thrifting | Minimalist System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #fcfcfd;
            color: #1a1a1a;
        }
        /* Menghilangkan tombol panah pada input angka */
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }
        
        .input-minimal {
            @apply w-full px-4 py-2.5 bg-white border border-gray-200 rounded-lg text-sm transition-all outline-none;
        }
        .input-minimal:focus {
            @apply border-indigo-600 ring-2 ring-indigo-50;
        }
        .custom-scroll::-webkit-scrollbar { height: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 10px; }
    </style>
</head>
<body class="antialiased">

    <div class="max-w-5xl mx-auto px-4 py-8 md:py-12">
        
        <!-- HEADER -->
        <header class="flex flex-col md:flex-row justify-between items-center mb-12 gap-4 border-b border-gray-100 pb-8">
            <div class="text-center md:text-left">
                <h1 class="text-2xl font-bold tracking-tight text-gray-900">Lydiana <span class="text-indigo-600">Thrifting</span></h1>
                <p class="text-gray-400 text-sm mt-1">Sistem Manajemen Penjualan</p>
            </div>
            <div class="text-xs font-semibold text-gray-500 bg-gray-50 px-4 py-2 rounded-full border border-gray-100">
                <span id="current-date"></span>
            </div>
        </header>

        <!-- STATS (MINIMAL) -->
        <div class="grid grid-cols-1 sm:grid-cols-3 gap-6 mb-12">
            <div class="bg-white p-6 rounded-xl border border-gray-100 shadow-sm">
                <p class="text-[11px] font-bold text-gray-400 uppercase tracking-wider mb-2">Pendapatan</p>
                <h3 id="revenue" class="text-xl font-bold text-gray-900">Rp0</h3>
            </div>
            <div class="bg-white p-6 rounded-xl border border-gray-100 shadow-sm">
                <p class="text-[11px] font-bold text-gray-400 uppercase tracking-wider mb-2">Unit Terjual</p>
                <h3 id="total-qty" class="text-xl font-bold text-gray-900">0 <span class="text-xs font-medium text-gray-400">Pcs</span></h3>
            </div>
            <div class="bg-white p-6 rounded-xl border border-gray-100 shadow-sm">
                <p class="text-[11px] font-bold text-gray-400 uppercase tracking-wider mb-2">Rata-rata</p>
                <h3 id="average-value" class="text-xl font-bold text-indigo-600">Rp0</h3>
            </div>
        </div>

        <!-- FORM ENTRY (MINIMAL & CLEAR) -->
        <section class="bg-white rounded-xl border border-gray-100 shadow-sm p-6 md:p-8 mb-12">
            <h2 class="text-sm font-bold text-gray-900 mb-6 flex items-center gap-2 uppercase tracking-widest">
                <i class="fa-solid fa-plus text-indigo-600"></i> Entri Transaksi
            </h2>
            
            <div class="space-y-6">
                <!-- Row 1 -->
                <div class="w-full md:w-2/3">
                    <label class="block text-xs font-bold text-gray-500 mb-2">Nama Pelanggan</label>
                    <input id="customer" type="text" placeholder="Masukkan nama..." class="input-minimal">
                </div>

                <!-- Row 2 -->
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                    <div class="md:col-span-1">
                        <label class="block text-xs font-bold text-gray-500 mb-2">Produk</label>
                        <input id="product" type="text" placeholder="Nama item" class="input-minimal">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 mb-2">Kategori</label>
                        <select id="category" class="input-minimal bg-white">
                            <option value="">Pilih</option>
                            <option>Baju</option>
                            <option>Celana</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 mb-2 text-center">Qty</label>
                        <input id="qty" type="number" placeholder="0" class="input-minimal text-center font-semibold">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 mb-2">Harga (Rp)</label>
                        <input id="price" type="number" placeholder="0" class="input-minimal font-semibold text-indigo-600">
                    </div>
                </div>

                <!-- Simpan Button -->
                <div class="pt-4">
                    <button onclick="addTransaction()" class="w-full md:w-auto px-10 py-3 bg-indigo-600 hover:bg-indigo-700 text-white text-xs font-bold rounded-lg transition-all shadow-md shadow-indigo-100 flex items-center justify-center gap-2 uppercase tracking-widest">
                        Simpan Transaksi
                    </button>
                </div>
            </div>
        </section>

        <!-- TABLE RIWAYAT -->
        <section class="bg-white rounded-xl border border-gray-100 shadow-sm overflow-hidden">
            <div class="p-6 border-b border-gray-50 flex flex-col md:flex-row justify-between items-center gap-4">
                <h2 class="text-sm font-bold text-gray-900 uppercase tracking-widest">Riwayat Penjualan</h2>
                <div class="relative w-full md:w-64">
                    <i class="fa-solid fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-300 text-[10px]"></i>
                    <input id="search" onkeyup="render()" type="text" placeholder="Cari data..." class="w-full pl-9 pr-4 py-2 bg-gray-50 border border-transparent rounded-lg text-xs focus:bg-white focus:border-gray-200 outline-none transition-all">
                </div>
            </div>

            <div class="overflow-x-auto custom-scroll">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-gray-50/50 text-[10px] uppercase font-bold text-gray-400 border-b border-gray-100">
                            <th class="px-6 py-4 text-center">Waktu</th>
                            <th class="px-6 py-4">Pelanggan</th>
                            <th class="px-6 py-4">Item</th>
                            <th class="px-6 py-4 text-center">Kategori</th>
                            <th class="px-6 py-4 text-center">Qty</th>
                            <th class="px-6 py-4 text-right">Harga</th>
                            <th class="px-6 py-4 text-right">Total</th>
                            <th class="px-6 py-4 text-center">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody" class="text-xs divide-y divide-gray-50">
                        <!-- Content -->
                    </tbody>
                </table>
            </div>

            <div id="emptyState" class="hidden py-20 text-center">
                <p class="text-gray-300 text-sm font-medium">Belum ada data tersedia.</p>
            </div>

            <div class="p-4 bg-white flex justify-center md:justify-end border-t border-gray-50">
                <button onclick="resetData()" class="text-[10px] text-gray-300 hover:text-red-400 font-bold uppercase tracking-[0.2em] transition-colors">
                    Hapus Semua Data
                </button>
            </div>
        </section>
    </div>

    <!-- NOTIFIKASI -->
    <div id="toast" class="fixed bottom-6 right-6 z-50 transform translate-y-20 opacity-0 transition-all duration-300">
        <div class="bg-gray-900 text-white px-6 py-3 rounded-lg shadow-xl text-xs font-bold uppercase tracking-widest">
            <span id="toast-msg"></span>
        </div>
    </div>

    <script>
        let transactions = JSON.parse(localStorage.getItem('transactions')) || [];

        const rupiah = (n) => new Intl.NumberFormat('id-ID', {
            style: 'currency', currency: 'IDR', minimumFractionDigits: 0
        }).format(n);

        function showToast(msg) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = msg;
            toast.classList.remove('translate-y-20', 'opacity-0');
            setTimeout(() => toast.classList.add('translate-y-20', 'opacity-0'), 2500);
        }

        function render() {
            const body = document.getElementById('tableBody');
            const emptyState = document.getElementById('emptyState');
            const q = document.getElementById('search').value.toLowerCase();
            body.innerHTML = '';
            
            let filtered = transactions.filter(x => 
                x.customer.toLowerCase().includes(q) || x.product.toLowerCase().includes(q)
            );

            if (filtered.length === 0) {
                emptyState.classList.remove('hidden');
            } else {
                emptyState.classList.add('hidden');
                filtered.forEach((t) => {
                    const realIndex = transactions.indexOf(t);
                    const total = t.qty * t.price;
                    const row = document.createElement('tr');
                    row.className = "hover:bg-gray-50 transition-colors";
                    row.innerHTML = `
                        <td class="px-6 py-5 text-[10px] text-gray-400 text-center font-medium">${t.date}</td>
                        <td class="px-6 py-5 font-bold text-gray-800">${t.customer}</td>
                        <td class="px-6 py-5 text-gray-500">${t.product}</td>
                        <td class="px-6 py-5 text-center">
                            <span class="px-2 py-0.5 rounded text-[9px] font-bold uppercase ${t.category === 'Baju' ? 'bg-indigo-50 text-indigo-600' : 'bg-orange-50 text-orange-600'}">
                                ${t.category}
                            </span>
                        </td>
                        <td class="px-6 py-5 text-center font-bold text-gray-600">x${t.qty}</td>
                        <td class="px-6 py-5 text-right text-gray-400 font-medium">${rupiah(t.price)}</td>
                        <td class="px-6 py-5 text-right font-bold text-gray-900">${rupiah(total)}</td>
                        <td class="px-6 py-5 text-center">
                            <button onclick="deleteTransaction(${realIndex})" class="text-gray-200 hover:text-red-500 transition-colors">
                                <i class="fas fa-trash-alt"></i>
                            </button>
                        </td>
                    `;
                    body.appendChild(row);
                });
            }

            const totalRevenue = transactions.reduce((a, b) => a + (b.qty * b.price), 0);
            const totalQty = transactions.reduce((a, b) => a + Number(b.qty), 0);
            const averageValue = transactions.length ? Math.round(totalRevenue / transactions.length) : 0;

            document.getElementById('revenue').innerText = rupiah(totalRevenue);
            document.getElementById('total-qty').innerHTML = `${totalQty} <span class="text-[10px] text-gray-300 font-bold uppercase">Pcs</span>`;
            document.getElementById('average-value').innerText = rupiah(averageValue);
            
            localStorage.setItem('transactions', JSON.stringify(transactions));
        }

        function addTransaction() {
            const inputs = {
                customer: document.getElementById('customer'),
                product: document.getElementById('product'),
                category: document.getElementById('category'),
                qty: document.getElementById('qty'),
                price: document.getElementById('price')
            };

            if (!inputs.customer.value || !inputs.product.value || !inputs.category.value || !inputs.qty.value || !inputs.price.value) {
                alert('Mohon isi semua data.');
                return;
            }

            const now = new Date();
            const timeStr = now.toLocaleDateString('id-ID', {day:'2-digit', month:'short'}) + ', ' + now.toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'});

            transactions.unshift({
                date: timeStr,
                customer: inputs.customer.value,
                product: inputs.product.value,
                category: inputs.category.value,
                qty: Number(inputs.qty.value),
                price: Number(inputs.price.value)
            });

            Object.values(inputs).forEach(el => el.value = '');
            
            render();
            showToast('DATA DISIMPAN');
        }

        function deleteTransaction(index) {
            if (confirm('Hapus transaksi ini?')) {
                transactions.splice(index, 1);
                render();
                showToast('DATA DIHAPUS');
            }
        }

        function resetData() {
            if (confirm('Reset database?')) {
                transactions = [];
                render();
                showToast('DATABASE BERSIH');
            }
        }

        document.getElementById('current-date').innerText = new Date().toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });

        render();
    </script>
</body>
</html>
